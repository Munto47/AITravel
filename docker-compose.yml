services:
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    environment:
      POSTGRES_DB: travel_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./backend/app/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d travel_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  y-websocket:
    build:
      context: ./y-websocket
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:1234:1234"
    environment:
      - HOST=0.0.0.0
      - PORT=1234
      - YPERSISTENCE=/data
    volumes:
      - yjs-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${BACKEND_PYTHON_IMAGE:-python:3.11-alpine}
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/travel_agent
      REDIS_URL: redis://redis:6379
      DEMO_MODE: "false"
      AMAP_MOCK: "false"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_Y_WEBSOCKET_URL: ${NEXT_PUBLIC_Y_WEBSOCKET_URL:-}
        NEXT_PUBLIC_AMAP_JS_KEY: ${NEXT_PUBLIC_AMAP_JS_KEY:-}
        NEXT_PUBLIC_AMAP_SECURITY_CODE: ${NEXT_PUBLIC_AMAP_SECURITY_CODE:-}
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  pg-data:
  yjs-data:
