# Compose 会从项目根目录 .env 读取变量（用于镜像加速等，见 .env.example）。
services:
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    environment:
      POSTGRES_DB: travel_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./backend/app/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d travel_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  y-websocket:
    build:
      context: ./docker/y-websocket
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${Y_WEBSOCKET_NODE_IMAGE:-node:18-alpine}
    image: agenttravel-y-websocket:1.5.4
    ports:
      - "1234:1234"
    environment:
      - HOST=0.0.0.0
      - PORT=1234
      - YPERSISTENCE=/data
    volumes:
      - yjs-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${BACKEND_PYTHON_IMAGE:-python:3.11-alpine}
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/travel_agent
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg-data:
  yjs-data:
